<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <div class="navbar">
        <i class="bi bi-play-btn"></i>
        <div class="nav-text">
          <a href="#" class="navigation-link">Esplora</a>
          <a href="#" class="navigation-link relative">Seguiti
            <div class="new-messages"></div>
          </a>
          <a href="#" class="navigation-link">Per te <div class="underline"></div></a>
        </div>
        <i class="bi bi-search"></i>
      </div>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="relative">
        <img src="./assets/img/boolean_logo.png" alt="icon boolean">
        <button id="follow-button"><span>&plus;</span></button>
      </div>
      <i class="bi bi-heart-fill"></i>
      588
      <i class="bi bi-chat-dots-fill"></i>
      13
      <i class="bi bi-bookmark-fill"></i>
      638
      <i class="bi bi-sign-turn-slight-right-fill"></i>
      491
    </div>

    <!-- Footer -->
    <footer>
      <section class="video-information">
        <h4>boolean.careers</h4>
        <p>Prova il Fundamentals Camp. 20 ore di corso <br>
        gratuito per...</p>
        <button class="button-show-text"><b>Vedi altro</b></button>
      </section>

      <section class="navbar-footer">
          <i class="bi bi-house-fill">
            <br>
            <span class="label">Home</span>
          </i>

          <i class="bi bi-people">
            <br>
            <span class="label">Amici</span>
          </i>

          <a href="#"><i class="bi bi-plus"></i></a>

          <i class="bi bi-chat-square relative">
            <br>
            <span class="label">Posta in arrivo</span>
            <div class="message-number">19</div>
          </i>

          <i class="bi bi-person">
            <br>
            <span class="label">Profilo</span>
          </i>
        </section>
      </footer>
  </div>

</body>

</html>
